<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект-Менеджер</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Боковое меню -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-hard-hat"></i>
                <span>Проект-Менеджер</span>
            </div>
            
            <div class="role-selector">
                <label>Вы вошли как:</label>
                <select id="role-select" class="role-dropdown">
                    <option value="prorab" selected>Прораб (Иван Петров)</option>
                    <option value="manager">Менеджер (Анна Смирнова)</option>
                    <option value="director">Директор (Алексей Морозов)</option>
                    <option value="buh">Бухгалтер (Елена Соколова)</option>
                </select>
            </div>
            
            <nav class="nav-menu" id="nav-menu">
                <!-- Меню будет заполняться через JavaScript -->
            </nav>

            <div class="user-info" id="user-info">
                <!-- Информация о пользователе будет заполняться через JavaScript -->
            </div>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <header class="header">
                <h1 id="page-title">Дашборд</h1>
                <div class="header-actions">
                    <button class="btn-notification">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                </div>
            </header>

            <div class="content" id="content">
                <!-- Контент будет заполняться через JavaScript -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
